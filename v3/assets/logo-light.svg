<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" width="280" height="72">
  <!-- Jago Hemat Logo Light - for light backgrounds -->
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01875f"/>
      <stop offset="100%" stop-color="#01A876"/>
    </linearGradient>
  </defs>

  <!-- Icon: stylized food bag + leaf -->
  <g transform="translate(8, 8)">
    <!-- Bag -->
    <rect x="4" y="16" width="36" height="40" rx="6" fill="none" stroke="url(#textGrad)" stroke-width="3"/>
    <!-- Bag top fold -->
    <path d="M4 22 Q22 14 40 22" fill="none" stroke="url(#textGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Bag handles -->
    <path d="M14 16 Q14 6 22 6 Q30 6 30 16" fill="none" stroke="url(#textGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Leaf on bag -->
    <path d="M22 52 Q14 42 22 30 Q30 42 22 52 Z" fill="#01875f" opacity="0.8"/>
    <line x1="22" y1="52" x2="22" y2="32" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Text: "Jago Hemat" -->
  <!-- "Jago" -->
  <text x="60" y="48" font-family="'Nunito', 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif" font-size="36" font-weight="800" fill="url(#textGrad)" letter-spacing="-0.5">Jago</text>

  <!-- "Hemat" -->
  <text x="148" y="48" font-family="'Nunito', 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif" font-size="36" font-weight="800" fill="#01875f" letter-spacing="-0.5">Hemat</text>

  <!-- Subtle underline accent -->
  <rect x="60" y="56" width="200" height="3" rx="1.5" fill="#01875f" opacity="0.3"/>

  <!-- Tagline: "Hemat Makanan, Hemat Rupiah" -->
  <text x="60" y="68" font-family="'Nunito', Arial, sans-serif" font-size="10" font-weight="600" fill="#01875f" opacity="0.65" letter-spacing="0.5">HEMAT MAKANAN · HEMAT RUPIAH</text>
</svg>
