<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9ED"/>
      <stop offset="100%" stop-color="#FFF3D6"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00000018"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)" rx="24"/>

  <!-- Decorative circles / blobs -->
  <circle cx="100" cy="100" r="180" fill="#01875f" opacity="0.04"/>
  <circle cx="1100" cy="500" r="220" fill="#01875f" opacity="0.04"/>
  <circle cx="950" cy="80" r="100" fill="#FFD700" opacity="0.12"/>
  <circle cx="200" cy="520" r="120" fill="#FFD700" opacity="0.08"/>

  <!-- Floating food items - left side decorations -->
  <!-- Roti / bread left -->
  <g transform="translate(80, 200) rotate(-15)">
    <ellipse cx="0" cy="0" rx="55" ry="35" fill="#F5C97A" filter="url(#shadow)"/>
    <ellipse cx="0" cy="-5" rx="55" ry="30" fill="#F7D080"/>
    <rect x="-50" y="-10" width="100" height="12" rx="6" fill="#E8A830" opacity="0.5"/>
    <line x1="-40" y1="5" x2="-20" y2="5" stroke="#D4901A" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="-10" y1="5" x2="10" y2="5" stroke="#D4901A" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="5" x2="40" y2="5" stroke="#D4901A" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Orange / fruit left -->
  <g transform="translate(140, 420)">
    <circle cx="0" cy="0" r="40" fill="#FF8C42" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="32" fill="#FFA060"/>
    <path d="M-5,-30 Q0,-38 5,-30" stroke="#01875f" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="0" cy="-32" rx="6" ry="4" fill="#01875f"/>
  </g>

  <!-- Leafy vegetable left -->
  <g transform="translate(200, 130) rotate(10)">
    <ellipse cx="0" cy="0" rx="38" ry="22" fill="#5DBE6E" filter="url(#shadow)"/>
    <ellipse cx="0" cy="0" rx="30" ry="16" fill="#6FCC7F"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#3D9E50" stroke-width="2" stroke-linecap="round"/>
    <line x1="-12" y1="-5" x2="-12" y2="5" stroke="#3D9E50" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#3D9E50" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="-5" x2="12" y2="5" stroke="#3D9E50" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- CENTER: Food delivery bag / box -->
  <g transform="translate(600, 300)" filter="url(#shadow)">
    <!-- Bag body -->
    <rect x="-130" y="-140" width="260" height="220" rx="20" fill="url(#bagGrad)" stroke="#E0D8CC" stroke-width="2"/>
    <!-- Bag top fold / lip -->
    <rect x="-130" y="-160" width="260" height="50" rx="20" fill="#FFFFFF" stroke="#E0D8CC" stroke-width="2"/>
    <rect x="-110" y="-165" width="220" height="20" rx="10" fill="#F0EBE3"/>
    <!-- Indonesian flag accent on bag center -->
    <rect x="-60" y="-100" width="120" height="80" rx="12" fill="#FFFFFF" stroke="#E8E0D4" stroke-width="1.5"/>
    <!-- Flag stripe - red top half -->
    <rect x="-60" y="-100" width="120" height="40" rx="12" fill="#CE2B37"/>
    <rect x="-60" y="-62" width="120" height="42" fill="#CE2B37"/>
    <!-- White bottom half -->
    <rect x="-60" y="-60" width="120" height="40" fill="#FFFFFF"/>
    <!-- Bag handles -->
    <path d="M-50,-160 Q-50,-200 0,-200 Q50,-200 50,-160" fill="none" stroke="#01875f" stroke-width="8" stroke-linecap="round"/>
    <!-- Jago Hemat text on bag -->
    <text x="0" y="15" text-anchor="middle" font-family="Nunito, Arial Rounded MT Bold, sans-serif" font-size="22" font-weight="800" fill="#01875f">Jago Hemat</text>
    <!-- Subtle leaf decoration -->
    <g transform="translate(0, -200)">
      <path d="M0,0 Q-15,-25 0,-40 Q15,-25 0,0 Z" fill="#01875f" opacity="0.7"/>
      <line x1="0" y1="0" x2="0" y2="-35" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    </g>
  </g>

  <!-- Price tag - "80% OFF" -->
  <g transform="translate(840, 220)" filter="url(#shadow)">
    <rect x="-90" y="-50" width="180" height="100" rx="16" fill="#01875f"/>
    <rect x="-90" y="-50" width="180" height="50" rx="16" fill="#016B4A"/>
    <!-- Tag hole -->
    <circle cx="-65" cy="0" r="10" fill="#015540"/>
    <circle cx="-65" cy="0" r="6" fill="#FFFFFF"/>
    <!-- OFF text -->
    <text x="10" y="-8" text-anchor="middle" font-family="Nunito, Arial Rounded MT Bold, sans-serif" font-size="22" font-weight="800" fill="#FFFFFF" opacity="0.85">SAVE</text>
    <text x="10" y="32" text-anchor="middle" font-family="Nunito, Arial Rounded MT Bold, sans-serif" font-size="38" font-weight="900" fill="#FFFFFF">80%</text>
    <!-- Star burst -->
    <g transform="translate(70, -30)">
      <polygon points="0,-16 4,-6 15,-6 7,1 10,12 0,6 -10,12 -7,1 -15,-6 -4,-6" fill="#FFD700" opacity="0.9"/>
    </g>
  </g>

  <!-- Floating items - right side -->
  <!-- Apple / fruit right -->
  <g transform="translate(1000, 160) rotate(20)">
    <circle cx="0" cy="0" r="36" fill="#E63946" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="28" fill="#EF4D56"/>
    <path d="M-4,-28 Q0,-36 4,-28" stroke="#01875f" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="0" cy="-30" rx="6" ry="4" fill="#01875f"/>
    <ellipse cx="-8" cy="-8" rx="8" ry="5" fill="#FFFFFF" opacity="0.3" transform="rotate(-30,-8,-8)"/>
  </g>

  <!-- Roti / bread right -->
  <g transform="translate(1050, 380) rotate(8)">
    <ellipse cx="0" cy="0" rx="50" ry="32" fill="#F5C97A" filter="url(#shadow)"/>
    <ellipse cx="0" cy="-5" rx="50" ry="26" fill="#F7D080"/>
    <rect x="-45" y="-8" width="90" height="10" rx="5" fill="#E8A830" opacity="0.45"/>
  </g>

  <!-- Leaf / salad right -->
  <g transform="translate(920, 480) rotate(-8)">
    <ellipse cx="0" cy="0" rx="35" ry="20" fill="#5DBE6E" filter="url(#shadow)"/>
    <ellipse cx="0" cy="0" rx="27" ry="14" fill="#6FCC7F"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#3D9E50" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Banana right upper -->
  <g transform="translate(980, 90) rotate(35)">
    <path d="M-30,10 Q0,-20 30,10 Q0,20 -30,10 Z" fill="#F5D060" filter="url(#shadow)"/>
    <path d="M-28,8 Q0,-18 28,8" fill="none" stroke="#E8B830" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="-30" cy="10" rx="6" ry="4" fill="#C8942A"/>
    <ellipse cx="30" cy="10" rx="6" ry="4" fill="#C8942A"/>
  </g>

  <!-- Small floating coins / savings sparkles -->
  <g transform="translate(760, 450)">
    <circle cx="0" cy="0" r="22" fill="#01875f" opacity="0.15"/>
    <circle cx="0" cy="0" r="15" fill="#01875f" opacity="0.25"/>
    <text x="0" y="5" text-anchor="middle" font-family="Nunito, sans-serif" font-size="14" font-weight="800" fill="#01875f">Rp</text>
  </g>

  <!-- Sparkles -->
  <g transform="translate(450, 140)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#FFD700" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#FFD700" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>
  <g transform="translate(780, 130)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>
  <g transform="translate(1100, 280)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#FFD700" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#FFD700" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Floating dots / particles -->
  <circle cx="350" cy="100" r="6" fill="#01875f" opacity="0.2"/>
  <circle cx="480" cy="520" r="8" fill="#01875f" opacity="0.15"/>
  <circle cx="320" cy="480" r="5" fill="#FFD700" opacity="0.3"/>
  <circle cx="900" cy="540" r="7" fill="#01875f" opacity="0.12"/>
  <circle cx="1100" cy="380" r="5" fill="#FFD700" opacity="0.25"/>
</svg>
